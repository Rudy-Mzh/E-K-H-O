name: Generate New Article

on:
  schedule:
    # Every Sunday at 22:00 UTC — generates next week's article pair
    - cron: '0 22 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate FR + EN article via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Commit new article
        run: |
          git config --global user.name "ekho-bot[bot]"
          git config --global user.email "ekho-bot@users.noreply.github.com"
          git add website/apps/web/src/data/articles.js
          git diff --staged --quiet || git commit -m "content: auto-generate article pair for next Mon/Thu slot"
          git push origin main
