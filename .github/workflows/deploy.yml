name: Build & Deploy to Hostinger

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: website/apps/web
        run: npm ci

      - name: Build
        working-directory: website/apps/web
        run: npm run build

      - name: Deploy via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ekho-studio.com
          port: 65002
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: website/apps/web/dist/*
          target: /home/u753560618/domains/ekho-studio.com/public_html/
          strip_components: 4
          rm: false
