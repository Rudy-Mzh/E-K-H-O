name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: website/apps/web
        run: npm ci

      - name: Build
        working-directory: website/apps/web
        run: npm run build

      - name: Push dist to deploy branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone la branche deploy existante (ou la crée si elle n'existe pas)
          git clone --depth=1 --branch deploy \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            deploy-branch 2>/dev/null || \
          (git clone --depth=1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            deploy-branch && \
           cd deploy-branch && git checkout --orphan deploy && git rm -rf .)

          # Remplace les fichiers par le nouveau build
          rsync -a --delete --exclude='.git' website/apps/web/dist/ deploy-branch/

          cd deploy-branch
          git add -A
          git diff --staged --quiet || git commit -m "deploy: build from ${{ github.sha }}"
          git push origin deploy
