name: CI (Python)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install -U pip wheel
          pip install pytest black ruff isort

      - name: Lint
        run: |
          ruff check .
          black --check .
          isort --check-only .

      - name: Tests
        run: pytest -q
